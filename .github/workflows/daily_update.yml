name: daily_update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}

jobs:
  update-charts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch DeFi fundamentals
        run: python3 fetch_fundamentals.py
        continue-on-error: true

      - name: Fetch equity fundamentals
        run: python3 fetch_equities.py
        continue-on-error: true

      - name: Fetch historical data
        run: python3 fetch_historical.py
        continue-on-error: true

      - name: Build charts
        run: python3 build_charts.py

      - name: Copy output to docs/
        run: |
          mkdir -p docs
          LATEST=$(ls -t output/*_charts.html | head -1)
          cp "$LATEST" docs/charts.html
          echo "Copied $LATEST to docs/charts.html"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/charts.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update charts $(date -u +%Y-%m-%d)"
            git push
          fi
